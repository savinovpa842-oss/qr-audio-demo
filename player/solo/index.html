<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Вперёд!</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            padding: 24px;
        }
        .player-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .cover {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.5;
            margin-bottom: 28px;
        }
        audio {
            width: 100%;
            border-radius: 12px;
            outline: none;
        }
        @media (max-width: 440px) {
            .player-card {
                padding: 28px 20px;
                border-radius: 18px;
            }
            .cover {
                width: 140px;
                height: 140px;
                font-size: 56px;
                border-radius: 16px;
            }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="cover">&#127925;</div>
        <h1>Вперёд!</h1>
        <p class="subtitle">Нажмите Play для воспроизведения</p>
        <audio controls preload="metadata">
            <source src="../audio/1ea8cc4b54d842f9b6b2.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
